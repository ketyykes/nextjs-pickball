schema: spec-driven

context: |
  本專案對 app/**、components/**、hooks/**、lib/**、data/** 下所有具備行為邏輯的模組採通用 TDD：
  先寫 failing Vitest 測試 → 實作至通過 → refactor。
  例外（不強制 TDD，但鼓勵補 smoke/E2E）：
    - 純樣式檔（*.css / *.scss）
    - 型別檔（*.d.ts、next-env.d.ts）
    - 入口與配置（app/layout.tsx、app/page.tsx、next.config.ts、postcss.config.mjs）
    - Playwright E2E（tests/e2e/**）
  測試工具：Vitest + @testing-library/react（已啟用 globals）、Playwright。
  單元測試鄰近程式碼以 *.test.ts(x) 形式放置；E2E 放 tests/e2e/specs/。

rules:
  specs:
    - 情境用 Given/When/Then；行為邏輯情境須可直接對應到 Vitest test case（附測試檔路徑與 it 名稱）
  design:
    - 明確標註哪些模組屬行為邏輯（必 TDD），哪些屬例外層（樣式／型別／入口／E2E，選配）
  tasks:
    - 行為邏輯 task 必須拆三步：① 新增失敗測試（附檔路徑與 it 名稱），並執行 `pnpm test -- --run <path>` 於 shell 實際看到紅燈後才進入下一步 ② 最小實作至 green ③ refactor（檢視實作，若無壞味道則註記 skipped；若有則重構並保持測試通過）
    - 每步需可用 `pnpm test -- --run <path>` 驗證
    - 例外層（樣式／型別／入口／E2E）task 不強制三步拆分，但至少要指定驗收方式
